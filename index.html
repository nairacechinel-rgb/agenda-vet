<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Naira · MedVet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🐾</span>
      <span class="logo-text">Agenda Naira</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="dashboard">
        <span class="nav-icon">📅</span> Hoje
      </a>
      <a href="#" class="nav-item" data-section="week">
        <span class="nav-icon">🗓</span> Semana
      </a>
      <a href="#" class="nav-item" data-section="classes">
        <span class="nav-icon">🏫</span> Aulas
      </a>
      <a href="#" class="nav-item" data-section="exams">
        <span class="nav-icon">📝</span> Provas & Trabalhos
      </a>
      <a href="#" class="nav-item" data-section="study">
        <span class="nav-icon">📚</span> Plano de Estudos
      </a>
      <a href="#" class="nav-item" data-section="tasks">
        <span class="nav-icon">✅</span> Tarefas
      </a>
      <a href="#" class="nav-item" data-section="tdah">
        <span class="nav-icon">⏱</span> Métodos TDAH
      </a>
      <a href="#" class="nav-item" data-section="settings">
        <span class="nav-icon">⚙</span> Configurações
      </a>
    </nav>

    <div class="sidebar-bottom">
      <button id="btnSync" class="btn-sync">
        <span>☁</span> Sincronizar Sheets
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div id="topbarTitle" class="topbar-title">Hoje</div>
      <div class="topbar-right">
        <button id="btnAddTask" class="btn-add-task">+ Nova Tarefa</button>
      </div>
    </header>

    <!-- SEÇÕES -->
    <div class="content">

      <section class="section active" id="section-dashboard"></section>
      <section class="section" id="section-week"></section>
      <section class="section" id="section-classes"></section>
      <section class="section" id="section-exams"></section>
      <section class="section" id="section-study"></section>
      <section class="section" id="section-tasks"></section>
      <section class="section" id="section-tdah"></section>
      <section class="section" id="section-settings"></section>

    </div>
  </main>

  <!-- MODAL: TAREFA -->
  <div class="modal-overlay" id="modalTaskOverlay">
    <div class="modal">
      <div class="modal-header">
        <span id="modalTaskTitle">Nova Tarefa</span>
        <button class="modal-close" id="modalTaskClose">✕</button>
      </div>
      <div class="modal-body">
        <label>Nome da tarefa</label>
        <input type="text" id="inputTaskTitle" placeholder="Ex: Estudar Anestesiologia" />

        <label>Data</label>
        <input type="date" id="inputTaskDate" />

        <label>Horário início</label>
        <input type="time" id="inputTaskStart" />

        <label>Horário fim</label>
        <input type="time" id="inputTaskEnd" />

        <label>Categoria</label>
        <select id="inputTaskCategory">
          <option value="study">📚 Estudo</option>
          <option value="home">🏠 Casa</option>
          <option value="sport">🏓 Esporte</option>
          <option value="leisure">🎮 Lazer</option>
          <option value="class">🏫 Aula</option>
          <option value="exam">📝 Prova</option>
        </select>

        <label>Prioridade</label>
        <select id="inputTaskPriority">
          <option value="low">🟢 Baixa</option>
          <option value="medium">🟡 Média</option>
          <option value="high">🔴 Alta</option>
        </select>

        <label>Observações</label>
        <textarea id="inputTaskNotes" placeholder="Observações opcionais..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnTaskCancel">Cancelar</button>
        <button class="btn-save"   id="btnTaskSave">Salvar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: PROVA -->
  <div class="modal-overlay" id="modalExamOverlay">
    <div class="modal">
      <div class="modal-header">
        <span id="modalExamTitle">Nova Avaliação</span>
        <button class="modal-close" id="modalExamClose">✕</button>
      </div>
      <div class="modal-body">
        <label>Disciplina</label>
        <input type="text" id="examSubject" placeholder="Ex: Anestesiologia" />

        <label>Tipo</label>
        <select id="examType">
          <option value="prova">📝 Prova</option>
          <option value="trabalho">📋 Trabalho</option>
          <option value="seminario">🎤 Seminário</option>
          <option value="pratica">🔬 Avaliação Prática</option>
        </select>

        <label>Data</label>
        <input type="date" id="examDate" />

        <label>Horário</label>
        <input type="time" id="examTime" />

        <label>Peso / Nota máxima</label>
        <input type="number" id="examWeight" placeholder="Ex: 10" />

        <label>Conteúdos (um por linha)</label>
        <div id="examTopicsContainer"></div>

        <label>Observações</label>
        <textarea id="examNotes" placeholder="Observações opcionais..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnExamCancel">Cancelar</button>
        <button class="btn-save"   id="btnExamSave">Salvar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- SCRIPTS (ordem importa) -->
  <script src="data.js"></script>
  <script src="classes.js"></script>
  <script src="exams.js"></script>
  <script src="tasks.js"></script>
  <script src="tdah.js"></script>
  <script src="sheets.js"></script>
  <script src="app.js"></script>

</body>
</html>
