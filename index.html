<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda Naira | MedVet 7ª Fase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="avatar">N</div>
      <div class="user-info">
        <span class="user-name">Naira</span>
        <span class="user-sub">MedVet · 7ª Fase</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" title="Fechar menu">&#9776;</button>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="dashboard">
        <span class="nav-icon">&#128197;</span> Hoje
      </a>
      <a href="#" class="nav-item" data-section="week">
        <span class="nav-icon">&#128198;</span> Semana
      </a>
      <a href="#" class="nav-item" data-section="classes">
        <span class="nav-icon">&#127979;</span> Aulas
      </a>
      <a href="#" class="nav-item" data-section="exams">
        <span class="nav-icon">&#128221;</span> Provas & Trabalhos
      </a>
      <a href="#" class="nav-item" data-section="study">
        <span class="nav-icon">&#129504;</span> Plano de Estudos
      </a>
      <a href="#" class="nav-item" data-section="tasks">
        <span class="nav-icon">&#9989;</span> Tarefas
      </a>
      <a href="#" class="nav-item" data-section="tdah">
        <span class="nav-icon">&#9889;</span> Métodos TDAH
      </a>
      <a href="#" class="nav-item" data-section="settings">
        <span class="nav-icon">&#9881;</span> Configurações
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-sync" id="btnSync">
        <span>&#9729;</span> Sincronizar Sheets
      </button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content" id="mainContent">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="btn-menu-mobile" id="btnMenuMobile">&#9776;</button>
      <div class="topbar-title" id="topbarTitle">Hoje</div>
      <div class="topbar-actions">
        <button class="btn-add-task" id="btnAddTask">+ Nova Tarefa</button>
        <div class="current-date" id="currentDate"></div>
      </div>
    </header>

    <!-- SECTIONS -->
    <div class="section active" id="section-dashboard">
      <!-- Preenchido pelo JS -->
    </div>

    <div class="section" id="section-week">
      <!-- Preenchido pelo JS -->
    </div>

    <div class="section" id="section-classes">
      <!-- Preenchido pelo JS -->
    </div>

    <div class="section" id="section-exams">
      <!-- Preenchido pelo JS -->
    </div>

    <div class="section" id="section-study">
      <!-- Preenchido pelo JS -->
    </div>

    <div class="section" id="section-tasks">
      <!-- Preenchido pelo JS -->
    </div>

    <div class="section" id="section-tdah">
      <!-- Preenchido pelo JS -->
    </div>

    <div class="section" id="section-settings">
      <!-- Preenchido pelo JS -->
    </div>

  </main>

  <!-- ===== MODALS ===== -->

  <!-- Modal: Nova Tarefa -->
  <div class="modal-overlay" id="modalTaskOverlay">
    <div class="modal" id="modalTask">
      <div class="modal-header">
        <h2 id="modalTaskTitle">Nova Tarefa</h2>
        <button class="modal-close" id="modalTaskClose">&times;</button>
      </div>
      <div class="modal-body">
        <label>Nome da Tarefa *</label>
        <input type="text" id="taskName" placeholder="Ex: Revisar Anestesiologia"/>

        <label>Data *</label>
        <input type="date" id="taskDate"/>

        <label>Horário de início *</label>
        <input type="time" id="taskTimeStart"/>

        <label>Horário de término</label>
        <input type="time" id="taskTimeEnd"/>

        <label>Categoria</label>
        <select id="taskCategory">
          <option value="home">🏠 Tarefas Domésticas</option>
          <option value="study">📚 Estudo</option>
          <option value="leisure">🎮 Lazer</option>
          <option value="sport">🏓 Esporte</option>
          <option value="other">📌 Outro</option>
        </select>

        <label>Prioridade</label>
        <select id="taskPriority">
          <option value="low">🟢 Baixa</option>
          <option value="medium">🟡 Média</option>
          <option value="high">🔴 Alta</option>
        </select>

        <label>Observações</label>
        <textarea id="taskNotes" rows="3" placeholder="Detalhes adicionais..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnTaskCancel">Cancelar</button>
        <button class="btn-save" id="btnTaskSave">Salvar Tarefa</button>
      </div>
    </div>
  </div>

  <!-- Modal: Nova Prova/Trabalho -->
  <div class="modal-overlay" id="modalExamOverlay">
    <div class="modal" id="modalExam">
      <div class="modal-header">
        <h2 id="modalExamTitle">Cadastrar Prova / Trabalho</h2>
        <button class="modal-close" id="modalExamClose">&times;</button>
      </div>
      <div class="modal-body">
        <label>Disciplina *</label>
        <select id="examSubject">
          <option value="">Selecione...</option>
          <option value="anestesiologia">Anestesiologia</option>
          <option value="tecnica_cirurgica">Técnica Cirúrgica</option>
          <option value="clinica_pequenos">Clínica de Pequenos Animais</option>
          <option value="anatomia_patologica">Anatomia Patológica Vet II</option>
          <option value="diagnostico_imagem">Diagnóstico por Imagem</option>
          <option value="outro">Outro</option>
        </select>

        <label>Tipo</label>
        <select id="examType">
          <option value="prova">📝 Prova</option>
          <option value="trabalho">📋 Trabalho</option>
          <option value="seminario">🎤 Seminário</option>
          <option value="pratica">🔬 Avaliação Prática</option>
        </select>

        <label>Data da Avaliação *</label>
        <input type="date" id="examDate"/>

        <label>Horário</label>
        <input type="time" id="examTime"/>

        <label>Conteúdos que cairão na prova</label>
        <div id="examTopicsContainer">
          <div class="topic-row">
            <input type="text" class="exam-topic-input" placeholder="Ex: Fármacos anestésicos inalatórios"/>
            <button class="btn-add-topic">+</button>
          </div>
        </div>

        <label>Peso / Valor da nota</label>
        <input type="number" id="examWeight" min="0" max="10" step="0.5" placeholder="Ex: 10"/>

        <label>Observações</label>
        <textarea id="examNotes" rows="3" placeholder="Informações extras, professor, sala..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnExamCancel">Cancelar</button>
        <button class="btn-save" id="btnExamSave">Salvar Avaliação</button>
      </div>
    </div>
  </div>

  <!-- Modal: Conflito de Horário -->
  <div class="modal-overlay" id="modalConflictOverlay">
    <div class="modal modal-sm" id="modalConflict">
      <div class="modal-header">
        <h2>⚠️ Conflito de Horário</h2>
        <button class="modal-close" id="modalConflictClose">&times;</button>
      </div>
      <div class="modal-body">
        <p id="conflictMessage"></p>
        <div class="conflict-options">
          <button class="btn-conflict" id="btnConflictReplace">Substituir atividade existente</button>
          <button class="btn-conflict" id="btnConflictKeepBoth">Manter ambas (sobrepor)</button>
          <button class="btn-conflict" id="btnConflictReschedule">Reagendar nova tarefa</button>
          <button class="btn-conflict btn-cancel" id="btnConflictCancel">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast de notificação -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
   <script src="data.js"></script>
  <script src="classes.js"></script>
  <script src="exams.js"></script>
  <script src="tasks.js"></script>
  <script src="tdah.js"></script>    <!-- ← adiciona esta linha -->
  <script src="sheets.js"></script>
  <script src="app.js"></script>
</body>
</html>
